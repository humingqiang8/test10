<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义渐变和样式 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#F57C00;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="300" height="300" fill="#f5f5f5"/>
  
  <!-- 三角体（四面体）的三个可见面 -->
  <!-- 前面 -->
  <polygon points="150,50 80,200 220,200" 
           fill="url(#grad1)" 
           stroke="#1B5E20" 
           stroke-width="2"
           filter="url(#shadow)"/>
  
  <!-- 左后面 -->
  <polygon points="150,50 80,200 150,180" 
           fill="url(#grad2)" 
           stroke="#0D47A1" 
           stroke-width="2"
           opacity="0.7"/>
  
  <!-- 右后面 -->
  <polygon points="150,50 220,200 150,180" 
           fill="url(#grad3)" 
           stroke="#E65100" 
           stroke-width="2"
           opacity="0.7"/>
  
  <!-- 底边（虚线表示被遮挡的边） -->
  <line x1="80" y1="200" x2="150" y2="180" 
        stroke="#333" 
        stroke-width="1.5" 
        stroke-dasharray="5,5"
        opacity="0.5"/>
  <line x1="220" y1="200" x2="150" y2="180" 
        stroke="#333" 
        stroke-width="1.5" 
        stroke-dasharray="5,5"
        opacity="0.5"/>
  
  <!-- 顶点标签 -->
  <text x="150" y="40" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">A</text>
  <text x="65" y="220" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">B</text>
  <text x="235" y="220" text-anchor="middle" font-family="Arial" font-size="14" fill="#333" font-weight="bold">C</text>
  <text x="150" y="175" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">D</text>
  
  <!-- 标题 -->
  <text x="150" y="280" text-anchor="middle" font-family="Arial" font-size="16" fill="#333" font-weight="bold">三角体（四面体）</text>
</svg>
