<svg width="200" height="200" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义正方体的顶点坐标 (等轴测投影) -->
  <!-- 前平面四个顶点 -->
  <!-- A: (-40, -40), B: (40, -40), C: (40, 40), D: (-40, 40) -->
  <!-- 后平面四个顶点 (向右上方偏移) -->
  <!-- E: (-10, -70), F: (70, -70), G: (70, 30), H: (-10, 30) -->
  
  <!-- 后方面 (深色) -->
  <polygon points="-10,-70 70,-70 70,30 -10,30" fill="#6c757d" stroke="#343a40" stroke-width="2"/>
  
  <!-- 右侧面 (中等色) -->
  <polygon points="40,-40 70,-70 70,30 40,40" fill="#adb5bd" stroke="#343a40" stroke-width="2"/>
  
  <!-- 顶面 (浅色) -->
  <polygon points="-40,-40 40,-40 70,-70 -10,-70" fill="#dee2e6" stroke="#343a40" stroke-width="2"/>
  
  <!-- 前方面 (最亮色) -->
  <polygon points="-40,-40 40,-40 40,40 -40,40" fill="#f8f9fa" stroke="#343a40" stroke-width="2"/>
  
  <!-- 左侧面 -->
  <polygon points="-40,-40 -10,-70 -10,30 -40,40" fill="#ced4da" stroke="#343a40" stroke-width="2"/>
  
  <!-- 底面 -->
  <polygon points="-40,40 40,40 70,30 -10,30" fill="#e9ecef" stroke="#343a40" stroke-width="2"/>
</svg>
