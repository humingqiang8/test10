<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义渐变 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#EF6C00;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 三角体底面（三角形） -->
  <polygon points="150,250 80,150 220,150" fill="url(#grad3)" stroke="#333" stroke-width="2" opacity="0.6"/>
  
  <!-- 三角体左侧面 -->
  <polygon points="150,50 80,150 150,250" fill="url(#grad1)" stroke="#333" stroke-width="2"/>
  
  <!-- 三角体右侧面 -->
  <polygon points="150,50 220,150 150,250" fill="url(#grad2)" stroke="#333" stroke-width="2"/>
  
  <!-- 三角体后侧面（虚线表示被遮挡的边） -->
  <polygon points="150,50 80,150 220,150" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- 顶点标签 -->
  <text x="150" y="40" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">A</text>
  <text x="70" y="150" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">B</text>
  <text x="230" y="150" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">C</text>
  <text x="150" y="270" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">D</text>
  
  <!-- 标题 -->
  <text x="150" y="20" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">三角体（三棱锥）</text>
</svg>
